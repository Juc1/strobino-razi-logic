name: Split and Deploy to Drupal

on:
  push:
    branches: [ main ]  # Automatically runs when you push to the 'main' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # This silences the Node.js warning by allowing the current versions to run
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Splitter Script
        # This executes the splitter.js file you just uploaded
        run: node splitter.js

      - name: Upload Artifacts for Review
        # This allows you to see/download the split files directly on GitHub
        uses: actions/upload-artifact@v4
        with:
          name: drupal-assets
          path: dist/

      - name: Deploy to Drupal Server
        # Using SSH Key authentication for better Cloudways compatibility
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USERNAME }}
          server: ${{ secrets.SFTP_SERVER }}
          # We use the SSH Key instead of the password secret
          ssh_private_key: ${{ secrets.SFTP_SSH_KEY }}
          port: 22
          local_path: './dist/*'
          remote_path: '/home/819629.cloudwaysapps.com/cebsysunkp/public_html/web/themes/avicenna/dist'
          sftp_only: true
          timeout: 190000
