name: Split and Deploy to Drupal

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ACTIONS_STEP_DEBUG: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Run Splitter Script
        run: node splitter.js

      - name: Upload Artifacts for Review
        uses: actions/upload-artifact@v7
        with:
          name: drupal-assets
          path: dist/

      - name: Deploy to Drupal Server
        # THIS IS THE KEY CHANGE: switching from FTP to SCP/SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          key: ${{ secrets.SFTP_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/home/819629.cloudwaysapps.com/cebsysunkp/public_html/web/themes/avicenna/dist"
          strip_components: 1
