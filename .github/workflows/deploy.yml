name: Split and Deploy to Drupal

on:
  push:
    branches: [ main ]  # Automatically runs when you push to the 'main' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 to resolve the deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Splitter Script
        # This executes the splitter.js file you just uploaded
        run: node splitter.js

      - name: Upload Artifacts for Review
        # This allows you to see/download the split files directly on GitHub
        uses: actions/upload-artifact@v4
        with:
          name: drupal-assets
          path: dist/

      - name: Deploy to Drupal Server
        # Using a highly reliable and widely used SFTP action
        uses: pressidium/sftp-upload@v1.1.0
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          # The Private Key secret
          ssh_private_key: ${{ secrets.SFTP_SSH_KEY }}
          # Local folder to upload
          local_path: 'dist'
          # Absolute path on Cloudways
          remote_path: '/home/819629.cloudwaysapps.com/cebsysunkp/public_html/web/themes/avicenna/dist'
          # Use Port 22 for SFTP
          port: 22

