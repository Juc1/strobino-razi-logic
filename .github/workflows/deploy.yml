name: Split and Deploy to Drupal

on:
  push:
    branches: [ main ]  # Automatically runs when you push to the 'main' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # Opt into Node.js 24 to resolve the deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'

      - name: Run Splitter Script
        # This executes the splitter.js file you just uploaded
        run: node splitter.js

      - name: Upload Artifacts for Review
        # This allows you to see/download the split files directly on GitHub
        uses: actions/upload-artifact@v7
        with:
          name: drupal-assets
          path: dist/

      - name: Deploy to Drupal Server
        # Using appleboy/scp-action: a industry standard for SSH/SFTP transfers
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          key: ${{ secrets.SFTP_SSH_KEY }}
          port: 22
          source: "dist/*"
          target: "/home/819629.cloudwaysapps.com/cebsysunkp/public_html/web/themes/avicenna/dist"
          # This removes the 'dist/' prefix so files land directly in the target folder
          strip_components: 1

