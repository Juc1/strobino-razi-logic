name: Split and Deploy to Drupal

on:
  push:
    branches: [ main ]  # Automatically runs when you push to the 'main' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # This silences the Node.js warning by allowing the current versions to run
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Splitter Script
        # This executes the splitter.js file you just uploaded
        run: node splitter.js

      - name: Upload Artifacts for Review
        # This allows you to see/download the split files directly on GitHub
        uses: actions/upload-artifact@v4
        with:
          name: drupal-assets
          path: dist/

      - name: Deploy to Drupal Server
        # Switching to a dedicated SFTP action
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.SFTP_USERNAME }}
          server: ${{ secrets.SFTP_SERVER }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          local_path: './dist/*'
          # Path on Cloudways. Note: Ensure this path is correct for your user
          remote_path: '/home/819629.cloudwaysapps.com/cebsysunkp/public_html/web/themes/avicenna/dist'
          # This ensures the remote folder is created if it doesn't exist
          sftp_only: true
          # Community fix for control socket timeout (value in milliseconds)
          timeout: 190000
